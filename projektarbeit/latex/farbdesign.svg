<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 730" width="100%" height="100%">
  <rect width="100%" height="100%" fill="#0B131E" rx="12"/>
  <rect x="20" y="20" width="560" height="690" fill="#111D2B" rx="8"/>

  <text x="50" y="70" font-family="monospace" font-size="20" font-weight="bold" fill="#00E5FF" letter-spacing="2">AMR DASHBOARD THEME</text>

