    <text x="95" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#00E5FF">--bg-panel</text>
    <text x="95" y="45" font-family="monospace" font-size="14" fill="#517C96">HEX: #111D2B | Hintergrund (Panel)</text>
    <text x="95" y="65" font-family="monospace" font-size="14" fill="#517C96">RGB: 17, 29, 43</text>
  </g>

  <g transform="translate(50, 310)">
