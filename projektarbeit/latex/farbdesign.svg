    <text x="95" y="45" font-family="monospace" font-size="14" fill="#517C96">HEX: #0B131E | Hintergrund (Basis)</text>
    <text x="95" y="65" font-family="monospace" font-size="14" fill="#517C96">RGB: 11, 19, 30</text>
  </g>

  <g transform="translate(50, 210)">
