    <text x="95" y="25" font-family="sans-serif" font-size="18" font-weight="bold" fill="#00E5FF">--accent-primary</text>
    <text x="95" y="45" font-family="monospace" font-size="14" fill="#517C96">HEX: #00E5FF | Akzent (Daten)</text>
