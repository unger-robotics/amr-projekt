# =============================================================================
# Docker Compose fuer ROS2 Humble auf Raspberry Pi 5
#
# Verwendung:
#   docker compose build          # Image bauen (~15-20 Min auf Pi 5)
#   docker compose run --rm amr   # Interaktive Shell
#   docker compose run --rm amr ros2 launch my_bot full_stack.launch.py
# =============================================================================

services:
  amr:
    build:
      context: ../..
      dockerfile: amr/docker/Dockerfile
    image: amr-ros2-humble:latest
    container_name: amr_ros2

    # Host-Netzwerk fuer ROS2 DDS Multicast Discovery
    network_mode: host

    # Hardware-Zugriff
    privileged: true

    # Dynamisch eingesteckte USB-Geraete auf Cgroup-Ebene erlauben
    device_cgroup_rules:
      - 'c 166:* rmw'   # ttyACM (USB-CDC)
      - 'c 188:* rmw'   # ttyUSB (CP2102)
      - 'c 81:* rmw'    # video4linux
      - 'c 116:* rmw'   # ALSA Sound

    # Explizites Mapping der Hardware-Pfade in den Container
    devices:
      - "/dev/amr_drive:/dev/amr_drive"     # ESP32-S3 #1 (Antrieb)
      - "/dev/amr_sensor:/dev/amr_sensor"   # ESP32-S3 #2 (Sensorik)
      - "/dev/ttyUSB0:/dev/ttyUSB0"         # RPLIDAR A1
      - "/dev/snd:/dev/snd"                 # I2S Audio-Ausgabe (MAX98357A)

    volumes:
      # ROS2 Workspace (read-write fuer colcon build)
      - ../pi5/ros2_ws/src/my_bot:/ros2_ws/src/my_bot:rw

      # Validierungsskripte (read-only)
      - ../scripts:/amr_scripts:ro
      - ../scripts:/scripts:ro

      # Hardware-Konfiguration (read-only)
      - ../../hardware:/hardware:ro

      # TLS-Zertifikate fuer Dashboard HTTPS/WSS (mkcert)
      - ../../dashboard:/dashboard:ro

      # ALSA softvol-Konfiguration (Software-Lautstaerke fuer MAX98357A)
      - ./asound.conf:/etc/asound.conf:ro

      # X11-Socket fuer RViz2
      - /tmp/.X11-unix:/tmp/.X11-unix:rw

      # Persistenter Build-Cache (colcon build/install/log)
      - ros2_build:/ros2_ws/build
      - ros2_install:/ros2_ws/install
      - ros2_log:/ros2_ws/log

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - ROS_DOMAIN_ID=0
      - TERM=xterm-256color
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_VISION_MODEL=${GEMINI_VISION_MODEL:-}
      - GEMINI_VOICE_MODEL=${GEMINI_VOICE_MODEL:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-}
      - GEMINI_THINKING_BUDGET=${GEMINI_THINKING_BUDGET:-0}
      - GEMINI_REQUEST_INTERVAL=${GEMINI_REQUEST_INTERVAL:-}
      - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY:-}
      - AMR_LOCATION=${AMR_LOCATION:-Wuppertal Vohwinkel}

    # Container bleibt interaktiv
    stdin_open: true
    tty: true

volumes:
  ros2_build:
  ros2_install:
  ros2_log:
