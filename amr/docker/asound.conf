# =============================================================================
# ALSA-Konfiguration fuer AMR-Roboter (MAX98357A I2S-Verstaerker)
#
# Der MAX98357A (Karte 0) hat keinen Hardware-Lautstaerkeregler.
# softvol stellt einen Software-Mixer "SoftMaster" bereit, den der
# audio_feedback_node via amixer ansteuert.
# =============================================================================

pcm.softvol {
    type softvol
    slave.pcm "hw:0,0"
    control {
        name "SoftMaster"
        card 0
    }
    min_dB -51.0
    max_dB 0.0
    resolution 256
}

pcm.!default {
    type plug
    slave.pcm "softvol"
}

ctl.!default {
    type hw
    card 0
}
