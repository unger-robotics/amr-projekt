controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0  # 10 Hz Regelung reicht für RPi 5
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.5
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 0.3
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # Plugins
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 10.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.10   # 10cm Genauigkeit am Ziel
      yaw_goal_tolerance: 0.15  # ~8 Grad Genauigkeit

    # --- HIER IST DER REGULATED PURE PURSUIT (RPP) ---
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.4  # Max Geschwindigkeit (m/s)
      lookahead_dist: 0.5      # Wie weit schaut er voraus? (m)
      min_lookahead_dist: 0.3
      max_lookahead_dist: 0.7
      lookahead_time: 1.5
      rotate_to_heading_min_angle: 0.785 # 45 Grad
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      # WICHTIG FÜR DIFF DRIVE:
      use_rotate_to_heading: true   # Drehen auf der Stelle erlauben
      rotate_to_heading_angular_vel: 1.0 # Drehgeschwindigkeit (rad/s)
      max_angular_accel: 2.0
      max_linear_accel: 1.5
      allow_reversing: false # Rückwärtsfahren nur bei Recovery

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      use_sim_time: false
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      robot_radius: 0.15 # 15cm Radius -> ANPASSEN AN DEINEN ROBOTER!
      # WICHTIG: Die Reihenfolge der Plugins ist entscheidend!
      # Sensoren zuerst, Inflation immer als letztes.
      plugins: ["voxel_layer", "range_layer", "inflation_layer"]

      # --- NEU: Ultraschall-Integration ---
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        topics: ["/range/front"]
        phi: 0.26               # 15 Grad Oeffnungswinkel
        clear_threshold: 0.46   # Wahrscheinlichkeits-Schwelle fuers Loeschen
        mark_threshold: 0.98    # Wahrscheinlichkeits-Schwelle fuers Eintragen
        clear_on_max_reading: true # Raeumt die Karte, wenn nichts erkannt wird

      voxel_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: True
        publish_voxel_map: True
        origin_z: 0.0
        z_resolution: 0.05
        z_voxels: 16
        max_obstacle_height: 2.0
        mark_threshold: 0
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35 # Sicherheitsabstand

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      use_sim_time: false
      robot_radius: 0.15 # ANPASSEN!
      resolution: 0.05
      track_unknown_space: true
      # Auch hier den Range-Sensor fuer die globale Pfadplanung ergaenzen
      plugins: ["static_layer", "obstacle_layer", "range_layer", "inflation_layer"]

      # --- NEU: Ultraschall-Integration (Global) ---
      range_layer:
        plugin: "nav2_costmap_2d::RangeSensorLayer"
        topics: ["/range/front"]
        phi: 0.26
        clear_threshold: 0.46
        mark_threshold: 0.98
        clear_on_max_reading: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.2
          obstacle_max_range: 2.5
          obstacle_min_range: 0.2

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.35

planner_server:
  ros__parameters:
    expected_planner_frequency: 10.0 # 20.0 ist Standard, 10 reicht
    use_sim_time: false
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: false
      allow_unknown: true

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200
