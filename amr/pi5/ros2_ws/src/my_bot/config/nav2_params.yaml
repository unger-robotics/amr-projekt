amcl:
  ros__parameters:
    use_sim_time: false
    alpha1: 0.15  # Odometrie Rauschen (Rotation -> Rotation)
    alpha2: 0.15  # Odometrie Rauschen (Rotation -> Translation)
    alpha3: 0.15  # Odometrie Rauschen (Translation -> Translation)
    alpha4: 0.15  # Odometrie Rauschen (Translation -> Rotation)
    alpha5: 0.15  # Omni-Antrieb (hier irrelevant, aber Standard)
    base_frame_id: "base_link"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_beams: 60
    laser_model_type: "likelihood_field"
    max_beams: 60
    max_particles: 2000
    min_particles: 500
    odom_frame_id: "odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "differential" # WICHTIG für dich
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    update_min_a: 0.1  # Update erst nach 0.1 rad Drehung
    update_min_d: 0.1  # Update erst nach 10cm Fahrt
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05

