; ==========================================================================
; PlatformIO Configuration für AMR Drive-Node (ESP32-S3 #1)
; ==========================================================================

[env]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino

build_unflags = -std=gnu++11
build_flags =
    -std=gnu++17
    -DARDUINO_USB_CDC_ON_BOOT=1
    -I include                      ; Lokaler Include-Ordner für config.h

monitor_speed = 115200
upload_speed = 921600

; Nutze den definierten udev-Symlink für den sicheren Upload
upload_port = /dev/amr_drive
monitor_port = /dev/amr_drive

[env:drive_node]
build_src_filter = +<*> -<led_ramp_test.cpp>

; --- micro-ROS Konfiguration ---
board_microros_transport = serial
board_microros_distro = humble

; --- Externe Bibliotheken ---
lib_deps =
    https://github.com/micro-ROS/micro_ros_platformio

; --- LED-Ramp-Test (ohne micro-ROS, schneller Build) ---
[env:led_test]
build_src_filter = +<led_ramp_test.cpp>
