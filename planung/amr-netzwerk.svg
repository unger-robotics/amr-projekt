<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="400" fill="#f8f9fa" rx="10"/>

  <text x="400" y="30" font-family="Arial" font-size="20" font-weight="bold" text-anchor="middle" fill="#333">AMR Netzwerk-Hierarchie &amp; Such-Logik</text>

  <rect x="50" y="150" width="120" height="80" rx="5" fill="#e0e0e0" stroke="#999" stroke-width="2"/>
  <text x="110" y="195" font-family="Arial" font-size="14" text-anchor="middle" font-weight="bold">MacBook</text>
  <text x="110" y="215" font-family="Arial" font-size="10" text-anchor="middle">Script Host</text>

  <path d="M 170 170 L 630 100" stroke="#28a745" stroke-width="3" stroke-dasharray="5,5">
    <animate attributeName="stroke-dashoffset" from="100" to="0" dur="5s" repeatCount="indefinite" />
  </path>
  <text x="400" y="125" font-family="Arial" font-size="12" fill="#28a745" text-anchor="middle" transform="rotate(-10, 400, 125)">1. Ethernet (Prio: High)</text>

  <path d="M 170 190 L 630 200" stroke="#007bff" stroke-width="3">
     <animate attributeName="opacity" values="0.3;1;0.3" dur="3s" repeatCount="indefinite" />
  </path>
  <text x="400" y="185" font-family="Arial" font-size="12" fill="#007bff" text-anchor="middle">2. iPhone Hotspot (Prio: 10)</text>

  <path d="M 170 210 L 630 300" stroke="#6c757d" stroke-width="2" opacity="0.5"/>
  <text x="400" y="270" font-family="Arial" font-size="12" fill="#6c757d" text-anchor="middle" transform="rotate(10, 400, 270)">3. Home WLAN (Prio: 4/5)</text>

  <rect x="630" y="150" width="120" height="100" rx="5" fill="#c51a4a" stroke="#a0153c" stroke-width="2"/>
  <text x="690" y="195" font-family="Arial" font-size="14" text-anchor="middle" fill="white" font-weight="bold">Pi 5 (Rover)</text>
  <text x="690" y="215" font-family="Arial" font-size="10" text-anchor="middle" fill="white">mDNS: rover.local</text>
  <text x="690" y="235" font-family="Arial" font-size="10" text-anchor="middle" fill="white">Multi-Network IP</text>

  <rect x="250" y="320" width="300" height="60" rx="5" fill="#fff" stroke="#333" stroke-width="1"/>
  <text x="400" y="340" font-family="Courier New" font-size="12" text-anchor="middle" font-weight="bold">./find_ip_pi.sh</text>
  <text x="400" y="365" font-family="Arial" font-size="11" text-anchor="middle">mDNS Check → Wait (10s) → ARP Multi-Scan → SSH</text>

  <circle cx="640" cy="90" r="5" fill="#28a745"/>
  <text x="650" y="95" font-family="Arial" font-size="10">Kabel getrennt? (No Carrier)</text>
</svg>
