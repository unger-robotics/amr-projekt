<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800">
  <defs>
    <style>
      .bg { fill: #0B131E; }

      /* Boxen gemaess CD */
      .box-sensor { fill: #111D2B; stroke: #517C96; stroke-width: 2; rx: 8; }
      .box-compute { fill: #111D2B; stroke: #00E5FF; stroke-width: 2; rx: 8; }
      .box-actuator { fill: #111D2B; stroke: #00FF66; stroke-width: 2; rx: 8; }

      /* Typografie gemaess CD */
      .txt-title { font-family: 'Fira Sans', sans-serif; font-weight: bold; font-size: 24px; fill: #00E5FF; text-anchor: middle; pointer-events: none; }
      .txt-sensor { font-family: 'Fira Sans', sans-serif; font-weight: bold; font-size: 14px; fill: #517C96; text-anchor: middle; pointer-events: none; }
      .txt-compute { font-family: 'Fira Sans', sans-serif; font-weight: bold; font-size: 16px; fill: #00E5FF; text-anchor: middle; pointer-events: none; }
      .txt-actuator { font-family: 'Fira Sans', sans-serif; font-weight: bold; font-size: 14px; fill: #00FF66; text-anchor: middle; pointer-events: none; }
      .txt-sub { font-family: 'Fira Mono', monospace; font-size: 11px; fill: #517C96; text-anchor: middle; pointer-events: none; }
      .lbl { font-family: 'Fira Mono', monospace; font-size: 12px; fill: #517C96; }

      /* Statische Datenfluss-Linien (Inkscape-sicher ohne Animation) */
      .flow-fast { stroke: #00E5FF; stroke-width: 3; fill: none; stroke-dasharray: 10,8; stroke-linecap: round; }
      .flow-med { stroke: #00FF66; stroke-width: 2; fill: none; stroke-dasharray: 8,8; stroke-linecap: round; }
      .flow-slow { stroke: #517C96; stroke-width: 2; fill: none; stroke-dasharray: 4,4; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <text x="600" y="50" class="txt-title">Logischer Informationsfluss (Echtzeit &amp; Asynchron)</text>

  <rect x="50" y="100" width="160" height="50" class="box-sensor" />
  <text x="130" y="130" class="txt-sensor">IMX296 Kamera</text>

  <rect x="50" y="200" width="160" height="50" class="box-sensor" />
  <text x="130" y="230" class="txt-sensor">RPLIDAR A1</text>

  <rect x="50" y="300" width="160" height="50" class="box-sensor" />
  <text x="130" y="330" class="txt-sensor">ReSpeaker Mic</text>

  <rect x="50" y="500" width="160" height="50" class="box-sensor" />
  <text x="130" y="530" class="txt-sensor">Hall-Encoder (x2)</text>

  <rect x="50" y="600" width="160" height="50" class="box-sensor" />
  <text x="130" y="630" class="txt-sensor">IMU &amp; INA260</text>

  <rect x="400" y="100" width="200" height="70" class="box-compute" />
  <text x="500" y="135" class="txt-compute">Hailo-8L NPU</text>
  <text x="500" y="155" class="txt-sub">PCIe Inferenz</text>

  <rect x="400" y="230" width="200" height="100" class="box-compute" />
  <text x="500" y="275" class="txt-compute">Raspberry Pi 5</text>
  <text x="500" y="295" class="txt-sub">ROS 2 / SLAM / Nav2</text>

  <rect x="400" y="520" width="200" height="100" class="box-compute" />
  <text x="500" y="565" class="txt-compute">ESP32-S3 Knoten</text>
  <text x="500" y="585" class="txt-sub">Drive &amp; Sensor Basis</text>

  <rect x="800" y="250" width="160" height="50" class="box-actuator" />
  <text x="880" y="280" class="txt-actuator">MAX98357A (Audio)</text>

  <rect x="800" y="450" width="160" height="50" class="box-actuator" />
  <text x="880" y="480" class="txt-actuator">Pan-Tilt Servos</text>

  <rect x="800" y="550" width="160" height="50" class="box-actuator" />
  <text x="880" y="580" class="txt-actuator">Cytron Motoren</text>

  <rect x="800" y="650" width="160" height="50" class="box-actuator" />
  <text x="880" y="680" class="txt-actuator">LED (IRLZ24N)</text>

  <path d="M 210 125 C 300 125, 300 135, 400 135" class="flow-fast" />
  <text x="250" y="120" class="lbl">CSI / MJPEG</text>

  <path d="M 210 225 C 300 225, 300 260, 400 260" class="flow-med" />
  <text x="250" y="235" class="lbl">USB (/scan)</text>

  <path d="M 210 325 C 300 325, 300 300, 400 300" class="flow-med" />
  <text x="250" y="325" class="lbl">USB Audio</text>

  <path d="M 210 525 C 300 525, 300 550, 400 550" class="flow-fast" />
  <text x="250" y="520" class="lbl">GPIO Interrupts</text>

  <path d="M 210 625 C 300 625, 300 590, 400 590" class="flow-slow" />
  <text x="250" y="620" class="lbl">I2C (Sensorik)</text>

  <path d="M 500 170 L 500 230" class="flow-fast" />
  <text x="510" y="205" class="lbl">YOLO Bounding Boxes</text>

  <path d="M 500 330 L 500 520" class="flow-med" />
  <text x="510" y="425" class="lbl">UART (micro-ROS)</text>

  <path d="M 600 280 C 700 280, 700 275, 800 275" class="flow-med" />
  <text x="650" y="270" class="lbl">I2S (ALSA)</text>

  <path d="M 600 540 C 700 540, 700 475, 800 475" class="flow-slow" />
  <text x="650" y="495" class="lbl">I2C -> PWM (PCA)</text>

  <path d="M 600 570 C 700 570, 700 575, 800 575" class="flow-fast" />
  <text x="650" y="565" class="lbl">PWM 20kHz (Drive)</text>

  <path d="M 600 600 C 700 600, 700 675, 800 675" class="flow-slow" />
  <text x="650" y="650" class="lbl">PWM Gate (LED)</text>
</svg>
