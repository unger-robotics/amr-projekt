<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .label { font-family: sans-serif; font-size: 12px; font-weight: bold; fill: #333; }
    .sub-label { font-family: sans-serif; font-size: 10px; fill: #666; }
    .box { stroke-width: 2; fill: #fff; }
    .pi-box { stroke: #c51a4a; fill: #f8e8ec; }
    .hailo-box { stroke: #00bcd4; fill: #e0f7fa; }
    .esp-box { stroke: #e67e22; fill: #fdf2e9; }
    .sensor-box { stroke: #2ecc71; fill: #eafaf1; }
    .cloud-box { stroke: #9b59b6; fill: #f4ecf7; stroke-dasharray: 5,5; }

    .data-line { fill: none; stroke: #bdc3c7; stroke-width: 2; stroke-linecap: round; }
    .pulse { fill: #3498db; }

    @keyframes flow {
      from { stroke-dashoffset: 100; }
      to { stroke-dashoffset: 0; }
    }

    .active-flow {
      stroke: #3498db;
      stroke-dasharray: 10;
      animation: flow 2s linear infinite;
    }
  </style>

  <!-- Background Grid -->
  <rect width="800" height="500" fill="#fafafa" />

  <!-- Decision Layer (Cloud) -->
  <rect x="300" y="20" width="200" height="60" rx="10" class="box cloud-box" />
  <text x="400" y="45" text-anchor="middle" class="label">Claude AI / Gemini API</text>
  <text x="400" y="60" text-anchor="middle" class="sub-label">Strategische Entscheidung</text>

  <!-- Central Intelligence (Pi 5) -->
  <rect x="300" y="180" width="200" height="120" rx="5" class="box pi-box" />
  <text x="400" y="210" text-anchor="middle" class="label">Raspberry Pi 5</text>
  <text x="400" y="230" text-anchor="middle" class="sub-label" style="fill:#c51a4a">ROS 2 (Humble)</text>
  <text x="400" y="250" text-anchor="middle" class="sub-label">Nav2 | SLAM | TF2</text>

  <!-- AI Accelerator (Hailo) -->
  <rect x="325" y="320" width="150" height="50" rx="5" class="box hailo-box" />
  <text x="400" y="340" text-anchor="middle" class="label">Hailo-8L Kit</text>
  <text x="400" y="355" text-anchor="middle" class="sub-label">YOLOv8 Objekterkennung</text>

  <!-- Senses (Input) -->
  <g transform="translate(50, 100)">
    <rect x="0" y="0" width="140" height="280" rx="5" class="box sensor-box" />
    <text x="70" y="25" text-anchor="middle" class="label">SENSORIK</text>

    <circle cx="30" cy="70" r="15" fill="#2ecc71" opacity="0.2" />
    <text x="55" y="75" class="sub-label">IMX296 Kamera</text>

    <circle cx="30" cy="130" r="15" fill="#2ecc71" opacity="0.2" />
    <text x="55" y="135" class="sub-label">RPLIDAR A1</text>

    <circle cx="30" cy="190" r="15" fill="#2ecc71" opacity="0.2" />
    <text x="55" y="195" class="sub-label">ReSpeaker v2.0</text>

    <circle cx="30" cy="250" r="15" fill="#2ecc71" opacity="0.2" />
    <text x="55" y="255" class="sub-label">Hall-Encoder</text>
  </g>

  <!-- Action (Output) -->
  <g transform="translate(610, 100)">
    <rect x="0" y="0" width="140" height="280" rx="5" class="box esp-box" />
    <text x="70" y="25" text-anchor="middle" class="label">AKTOREN</text>

    <rect x="20" y="60" width="100" height="40" rx="3" fill="#e67e22" opacity="0.2" />
    <text x="70" y="85" text-anchor="middle" class="sub-label">XIAO ESP32 (Motoren)</text>

    <rect x="20" y="120" width="100" height="40" rx="3" fill="#e67e22" opacity="0.2" />
    <text x="70" y="145" text-anchor="middle" class="sub-label">MG996R (Pan-Tilt)</text>

    <rect x="20" y="180" width="100" height="40" rx="3" fill="#e67e22" opacity="0.2" />
    <text x="70" y="205" text-anchor="middle" class="sub-label">Speaker (TTS)</text>
  </g>

  <!-- Connections & Animations -->

  <!-- Senses to Pi 5 -->
  <path d="M190 240 L300 240" class="data-line active-flow" />
  <circle r="4" class="pulse">
    <animateMotion dur="1.5s" repeatCount="indefinite" path="M190 240 L300 240" />
  </circle>

  <!-- Pi 5 to Hailo (Roundtrip) -->
  <path d="M370 300 L370 320" class="data-line active-flow" style="stroke:#00bcd4" />
  <path d="M430 320 L430 300" class="data-line active-flow" style="stroke:#00bcd4" />

  <!-- Pi 5 to Cloud (Decision) -->
  <path d="M400 180 L400 80" class="data-line active-flow" style="stroke:#9b59b6" />
  <circle r="4" fill="#9b59b6">
    <animateMotion dur="3s" repeatCount="indefinite" path="M400 180 L400 80" />
  </circle>

  <!-- Pi 5 to Actors -->
  <path d="M500 240 L610 240" class="data-line active-flow" style="stroke:#e67e22" />
  <circle r="4" fill="#e67e22">
    <animateMotion dur="2s" repeatCount="indefinite" path="M500 240 L610 240" />
  </circle>

  <!-- Legend / Flow Description -->
  <text x="400" y="450" text-anchor="middle" class="sub-label" style="font-style:italic">Datenfluss: Sensorik -> Bildverarbeitung (Hailo) -> Strategie (Cloud AI) -> Handlung (ESP32/Servos)</text>
</svg>
