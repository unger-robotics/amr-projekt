<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 850">
  <defs>
    <style>
      .bg { fill: #0B131E; }
      .box { fill: #111D2B; stroke: #517C96; stroke-width: 2; rx: 6; cursor: help; transition: all 0.2s ease; }
      .box:hover { fill: #0B131E; stroke: #00E5FF; stroke-width: 3; }
      .title { font-family: monospace; font-weight: bold; font-size: 14px; fill: #00E5FF; pointer-events: none; }
      .sub { font-family: monospace; font-size: 11px; fill: #517C96; pointer-events: none; }

      /* Animations */
      @keyframes pulse-power { 0% { stroke-width: 2; opacity: 0.7; } 50% { stroke-width: 4; opacity: 1; } 100% { stroke-width: 2; opacity: 0.7; } }
      @keyframes pulse-bus { 0% { stroke-width: 2; stroke-dashoffset: 0; } 100% { stroke-width: 2; stroke-dashoffset: -20; } }

      .power-line { stroke: #517C96; fill: none; animation: pulse-power 2s infinite ease-in-out; }
      .usb-line { stroke: #00E5FF; fill: none; stroke-dasharray: 10,5; animation: pulse-bus 1.5s linear infinite; }
      .pwm-line { stroke: #00FF66; fill: none; stroke-dasharray: 4,4; animation: pulse-bus 1s linear infinite; }
      .i2c-line { stroke: #517C96; fill: none; stroke-dasharray: 5,5; animation: pulse-bus 2s linear infinite; }
    </style>
  </defs>

  <rect width="100%" height="100%" class="bg" />

  <g transform="translate(20, 20)">
    <rect width="200" height="120" class="box" />
    <text x="10" y="20" class="title">Legende (Pulsierend)</text>
    <line x1="10" y1="40" x2="40" y2="40" class="power-line" /> <text x="50" y="45" class="sub">DC Power</text>
    <line x1="10" y1="65" x2="40" y2="65" class="i2c-line" /> <text x="50" y="70" class="sub">I2C / I2S Busse</text>
    <line x1="10" y1="90" x2="40" y2="90" class="usb-line" /> <text x="50" y="95" class="sub">USB / PCIe</text>
    <line x1="10" y1="115" x2="40" y2="115" class="pwm-line" /> <text x="50" y="120" class="sub">PWM / Signale</text>
  </g>

  <g transform="translate(450, 50)">
    <rect width="300" height="200" class="box">
      <title>Raspberry Pi 5&#10;Host: ROS 2 Humble (Docker)&#10;Last: ~15 W</title>
    </rect>
    <text x="20" y="30" class="title">Raspberry Pi 5 (Host)</text>
    <text x="20" y="55" class="sub">I2C B (Pin 3/5) → PCA9685</text>
    <text x="20" y="75" class="sub">I2S (Pin 12/35/40) → MAX98357A</text>
    <text x="20" y="95" class="sub">PCIe → Hailo-8L (AI)</text>
    <text x="20" y="115" class="sub">USB → RPLIDAR &amp; ReSpeaker</text>
  </g>

  <g transform="translate(450, 450)">
    <rect width="300" height="250" class="box">
      <title>Seeed XIAO ESP32-S3&#10;100 Hz RTOS-Schleife&#10;micro-ROS Client</title>
    </rect>
    <text x="20" y="30" class="title">XIAO ESP32-S3 (Echtzeit)</text>
    <text x="20" y="55" class="sub">I2C A (D4/D5) → INA260 &amp; MPU6050</text>
    <text x="20" y="75" class="sub">PWM (D0-D3) → MDD3A</text>
    <text x="20" y="95" class="sub">Interrupts (D6-D9) → Encoders</text>
    <text x="20" y="115" class="sub">PWM (D10) → LED (IRLZ24N)</text>
  </g>

  <g transform="translate(850, 50)">
    <rect width="180" height="50" class="box"><title>Hailo-8L | 26 TOPS | PCIe Gen3</title></rect>
    <text x="15" y="30" class="title">Hailo-8L (AI Kit)</text>
  </g>
  <g transform="translate(850, 120)">
    <rect width="180" height="50" class="box"><title>PCA9685 | 0x40 | I2C B</title></rect>
    <text x="15" y="30" class="title">PCA9685 (Pan-Tilt)</text>
  </g>
  <g transform="translate(850, 190)">
    <rect width="180" height="50" class="box"><title>MAX98357A | 3.2W | I2S</title></rect>
    <text x="15" y="30" class="title">MAX98357A (Audio Out)</text>
  </g>

  <g transform="translate(850, 450)">
    <rect width="180" height="50" class="box"><title>Cytron MDD3A | 12V Dual Motor Driver</title></rect>
    <text x="15" y="30" class="title">Cytron MDD3A</text>
  </g>
  <g transform="translate(850, 520)">
    <rect width="180" height="50" class="box"><title>INA260 | 0x41 | Strommessung</title></rect>
    <text x="15" y="30" class="title">INA260 (0x41)</text>
  </g>
  <g transform="translate(850, 590)">
    <rect width="180" height="50" class="box"><title>MPU6050 | 0x68</title></rect>
    <text x="15" y="30" class="title">MPU6050 (0x68)</text>
  </g>
  <g transform="translate(850, 660)">
    <rect width="180" height="50" class="box"><title>IRLZ24N | 12V LED Streifen | PWM Dimmung</title></rect>
    <text x="15" y="30" class="title">LED (IRLZ24N)</text>
  </g>

  <g transform="translate(50, 340)">
    <rect width="180" height="60" class="box"><title>3S Li-Ion | 30.2 Wh | 12V</title></rect>
    <text x="15" y="35" class="title">12V Akku (3S)</text>
  </g>
  <g transform="translate(50, 180)">
    <rect width="180" height="50" class="box"><title>IP68 Buck | 5V / 5A | >96% Eff.</title></rect>
    <text x="15" y="30" class="title">5V Buck (Pi 5)</text>
  </g>
  <g transform="translate(50, 500)">
    <rect width="180" height="50" class="box"><title>Pololu D36V50F6 | 6V / 5.5A</title></rect>
    <text x="15" y="30" class="title">6V Pololu (Servos)</text>
  </g>

  <polyline points="230,370 350,370 350,205 230,205" class="power-line" />
  <polyline points="230,370 350,370 350,525 230,525" class="power-line" />

  <line x1="750" y1="75" x2="850" y2="75" class="usb-line" />
  <line x1="750" y1="145" x2="850" y2="145" class="i2c-line" />
  <line x1="750" y1="215" x2="850" y2="215" class="i2c-line" />

  <line x1="750" y1="475" x2="850" y2="475" class="pwm-line" />
  <line x1="750" y1="545" x2="850" y2="545" class="i2c-line" />
  <line x1="750" y1="615" x2="850" y2="615" class="i2c-line" />
  <line x1="750" y1="685" x2="850" y2="685" class="pwm-line" />

  <line x1="600" y1="250" x2="600" y2="450" class="usb-line" />
  <text x="610" y="350" class="sub">USB-CDC (micro-ROS)</text>
</svg>
